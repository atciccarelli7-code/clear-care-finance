name: Apply Medical Bill Productization Migration

on:
  push:
    branches:
      - agent/medical-bill-productization-2026-07-20
    paths:
      - scripts/apply-medical-bill-productization.mjs
      - .github/workflows/apply-medical-bill-productization.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/medical-bill-productization-2026-07-20
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply idempotent migration
        run: node scripts/apply-medical-bill-productization.mjs

      - name: Commit migrated source
        run: |
          if git diff --quiet; then
            echo "Migration already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.tsx src/pages/MedicalBillReviewToolkitPage.tsx src/pages/ArticlePage.tsx src/lib/seoRegistry.ts
          git commit -m "feat: connect medical bill product funnel [skip ci]"
          git push origin HEAD:agent/medical-bill-productization-2026-07-20
