name: Browser certification

on:
  pull_request:
    paths:
      - "src/**"
      - "public/**"
      - "e2e/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.ts"
      - ".github/workflows/browser-certification.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  flagship-journeys:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:browser:journeys
      - name: Capture representative desktop and mobile product visuals
        if: success()
        run: npx playwright test e2e/professional-product-visuals.spec.ts
      - name: Generate representative Letter and A4 print PDFs
        if: success()
        run: npx playwright test e2e/print-pdf-certification.spec.ts --project=desktop-chromium
      - name: Upload browser certification and visual evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-certification-${{ github.run_id }}
          path: |
            healthcare-offer-verification-*.png
            print-certification/**/*.pdf
            test-results/
            playwright-report/
          retention-days: 14
          if-no-files-found: ignore
