name: Browser certification

on:
  pull_request:
    paths:
      - "src/**"
      - "public/**"
      - "e2e/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.ts"
      - ".github/workflows/browser-certification.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  flagship-journeys:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:browser:journeys
      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-certification-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7
          if-no-files-found: ignore
