name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint advisory
        run: npm run lint
        continue-on-error: true

      - name: Full guide content check
        run: npm run guide:content-check

      - name: Quick guide content check
        run: npm run guide:quick-content-check

      - name: All quick guide content checks
        run: npm run guide:quick-content-check:all

      - name: Unit tests
        run: npx vitest run

      - name: Build
        run: npm run build
