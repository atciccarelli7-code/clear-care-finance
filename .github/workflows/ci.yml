name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Lint advisory
        run: npm run lint
        continue-on-error: true

      - name: Publication, content, and unit tests
        run: npm test

      - name: All quick guide content checks
        run: npm run guide:quick-content-check:all

      - name: Production build, bundle budget, and prerender
        run: npm run build
