name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Publication readiness
        run: npm run trust:check

      - name: Institutional archive boundary
        run: npm run institutional:boundary-check

      - name: Patient guide capability manifest
        run: npm run patient-education:manifest-check

      - name: Consumer patient guide public contract
        run: npm run patient-education:public-contracts-check

      - name: Content freshness
        run: npm run content:freshness-check

      - name: Long-form guide content
        run: npm run guide:content-check

      - name: Quick guide content
        run: npm run guide:quick-content-check

      - name: Consumer article registry tests
        run: npx vitest run src/data/consumerPatientGuideArticles.test.ts

      - name: Consumer medication boundary test
        run: npx vitest run src/test/BloodThinnerReadinessWorkflow.test.tsx

      - name: Consumer guide library test
        run: npx vitest run src/test/HospitalGuidePilotShowcase.test.tsx

      - name: Paused institutional manifest test
        run: npx vitest run src/test/careReadinessBuyerBrief.test.ts

      - name: Consumer checklist boundary test
        run: npx vitest run src/test/bloodThinnerReadiness.test.ts

      - name: Five guide conversion test
        run: npx vitest run src/test/hospitalGuidePilot.test.ts

      - name: Consumer finder contract test
        run: npx vitest run src/test/patientEducationPilot.test.ts

      - name: Full unit test suite
        run: npx vitest run

      - name: All quick guide content checks
        run: npm run guide:quick-content-check:all

      - name: AdSense publisher-content governance
        run: npm run seo:generate && npm run adsense:audit && npm run adsense:check

      - name: Upload generated AdSense route audit
        uses: actions/upload-artifact@v4
        with:
          name: adsense-readiness-audit
          path: docs/adsense-readiness-audit.md
          if-no-files-found: error

      - name: Production build, bundle budget, and prerender
        run: npm run build

      - name: Install Chromium for browser verification
        run: npx playwright install --with-deps chromium

      - name: Consumer patient guide browser and accessibility journey
        run: npm run test:browser:patient-education

      - name: Premium system fail-closed, workflow, mobile, print, and accessibility journeys
        run: npm run test:browser:premium

      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-failure-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7
          if-no-files-found: ignore
