name: Generate AdSense route audit

on:
  push:
    branches:
      - agent/adsense-low-value-remediation

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out remediation branch
        uses: actions/checkout@v4
        with:
          ref: agent/adsense-low-value-remediation

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate canonical route audit
        run: npm run seo:generate && npm run adsense:audit

      - name: Commit generated audit
        run: |
          if git diff --quiet -- docs/adsense-readiness-audit.md; then
            echo "Audit is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/adsense-readiness-audit.md public/sitemap.xml src/data/runtimeSeoManifest.ts
          git commit -m "Generate full AdSense route audit"
          git push origin HEAD:agent/adsense-low-value-remediation
