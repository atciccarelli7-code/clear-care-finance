name: Guide PDF Preflight Artifact

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/guide-pdf-preflight.yml
      - docs/quick-guide-library-roadmap.md
      - docs/medicare-medicaid-guide-final-pre-pdf-manuscript.md
      - docs/medicare-medicaid-quick-guide-pre-pdf-manuscript.md
      - docs/medicare-sign-up-quick-guide-pre-pdf-manuscript.md
      - docs/medicaid-application-quick-guide-pre-pdf-manuscript.md
      - scripts/build-medicare-medicaid-guide-pdf.mjs
      - scripts/build-quick-guide-pdf.mjs
      - scripts/build-medicare-medicaid-quick-guide-pdf.mjs
      - scripts/check-medicare-medicaid-guide-content.mjs
      - scripts/check-quick-guide-content.mjs
      - scripts/check-medicare-medicaid-quick-guide-content.mjs
      - scripts/quick-guide-definitions.mjs
      - package.json
      - package-lock.json

permissions:
  contents: write

jobs:
  build-guide-pdf-artifacts:
    name: Build draft guide PDF artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run guide content checks
        run: |
          set -euo pipefail
          npm run guide:content-check
          npm run guide:quick-content-check
          npm run guide:quick-content-check:all

      - name: Build draft PDFs locally in docs/generated
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          set -euo pipefail
          npm run guide:pdf:draft
          npm run guide:quick-pdf:draft:all

      - name: Confirm generated full guide files exist and are non-empty
        run: |
          set -euo pipefail
          html="docs/generated/medicare-medicaid-guide/hospital-family-guide-medicare-medicaid-preflight.html"
          pdf="docs/generated/medicare-medicaid-guide/hospital-family-guide-medicare-medicaid-preflight.pdf"

          test -s "$html"
          test -s "$pdf"

          html_bytes=$(stat -c%s "$html")
          pdf_bytes=$(stat -c%s "$pdf")

          echo "Generated full guide HTML bytes: $html_bytes"
          echo "Generated full guide PDF bytes: $pdf_bytes"

          if [ "$pdf_bytes" -lt 50000 ]; then
            echo "Generated full guide PDF is unexpectedly small. Treating this as a failed preflight artifact."
            exit 1
          fi

      - name: Confirm generated quick guide files exist and are non-empty
        run: |
          set -euo pipefail

          check_quick_guide () {
            local label="$1"
            local html="$2"
            local pdf="$3"

            test -s "$html"
            test -s "$pdf"

            html_bytes=$(stat -c%s "$html")
            pdf_bytes=$(stat -c%s "$pdf")

            echo "Generated $label quick guide HTML bytes: $html_bytes"
            echo "Generated $label quick guide PDF bytes: $pdf_bytes"

            if [ "$pdf_bytes" -lt 20000 ]; then
              echo "Generated $label quick guide PDF is unexpectedly small. Treating this as a failed preflight artifact."
              exit 1
            fi
          }

          check_quick_guide "hospital discharge" \
            "docs/generated/medicare-medicaid-quick-guide/hospital-discharge-medicare-quick-guide-preflight.html" \
            "docs/generated/medicare-medicaid-quick-guide/hospital-discharge-medicare-quick-guide-preflight.pdf"

          check_quick_guide "Medicare sign-up" \
            "docs/generated/medicare-sign-up-quick-guide/medicare-sign-up-quick-guide-preflight.html" \
            "docs/generated/medicare-sign-up-quick-guide/medicare-sign-up-quick-guide-preflight.pdf"

          check_quick_guide "Medicaid application" \
            "docs/generated/medicaid-application-quick-guide/medicaid-application-quick-guide-preflight.html" \
            "docs/generated/medicaid-application-quick-guide/medicaid-application-quick-guide-preflight.pdf"

      - name: Fail if unexpected public PDFs are present before publish step
        run: |
          set -euo pipefail
          allowed="public/guides/hospital-discharge-medicare-quick-guide.pdf"

          if [ -d public/drafts ] && find public/drafts -type f -iname "*.pdf" | grep -q .; then
            echo "Draft PDF found under public/drafts. This is not allowed."
            find public/drafts -type f -iname "*.pdf"
            exit 1
          fi

          if [ -d public/guides ]; then
            unexpected=$(find public/guides -type f -iname "*.pdf" ! -path "$allowed" -print)
            if [ -n "$unexpected" ]; then
              echo "Unexpected public guide PDF found before controlled publish step."
              echo "$unexpected"
              exit 1
            fi
          fi

      - name: Create full guide artifact manifest
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          set -euo pipefail
          out="docs/generated/medicare-medicaid-guide/guide-preflight-artifact-manifest.txt"
          html="docs/generated/medicare-medicaid-guide/hospital-family-guide-medicare-medicaid-preflight.html"
          pdf="docs/generated/medicare-medicaid-guide/hospital-family-guide-medicare-medicaid-preflight.pdf"

          {
            echo "Guide PDF Preflight Artifact Manifest"
            echo "Generated at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Commit: ${GITHUB_SHA}"
            echo "Run ID: ${GITHUB_RUN_ID}"
            echo "Run number: ${GITHUB_RUN_NUMBER}"
            echo "Chrome path: ${CHROME_PATH:-not set}"
            echo
            echo "Generated files:"
            ls -lh "$html" "$pdf"
            echo
            echo "SHA-256 checksums:"
            sha256sum "$html" "$pdf"
          } > "$out"

          cat "$out"

      - name: Create quick guide artifact manifests
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          set -euo pipefail

          make_manifest () {
            local title="$1"
            local out="$2"
            local html="$3"
            local pdf="$4"

            {
              echo "$title"
              echo "Generated at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo "Commit: ${GITHUB_SHA}"
              echo "Run ID: ${GITHUB_RUN_ID}"
              echo "Run number: ${GITHUB_RUN_NUMBER}"
              echo "Chrome path: ${CHROME_PATH:-not set}"
              echo
              echo "Generated files:"
              ls -lh "$html" "$pdf"
              echo
              echo "File sizes:"
              stat -c "%n %s bytes" "$html" "$pdf"
              echo
              echo "SHA-256 checksums:"
              sha256sum "$html" "$pdf"
            } > "$out"

            cat "$out"
          }

          make_manifest \
            "Hospital Discharge Medicare Quick Guide Preflight Artifact Manifest" \
            "docs/generated/medicare-medicaid-quick-guide/quick-guide-preflight-artifact-manifest.txt" \
            "docs/generated/medicare-medicaid-quick-guide/hospital-discharge-medicare-quick-guide-preflight.html" \
            "docs/generated/medicare-medicaid-quick-guide/hospital-discharge-medicare-quick-guide-preflight.pdf"

          make_manifest \
            "Medicare Sign-Up Quick Guide Preflight Artifact Manifest" \
            "docs/generated/medicare-sign-up-quick-guide/quick-guide-preflight-artifact-manifest.txt" \
            "docs/generated/medicare-sign-up-quick-guide/medicare-sign-up-quick-guide-preflight.html" \
            "docs/generated/medicare-sign-up-quick-guide/medicare-sign-up-quick-guide-preflight.pdf"

          make_manifest \
            "Medicaid Application Quick Guide Preflight Artifact Manifest" \
            "docs/generated/medicaid-application-quick-guide/quick-guide-preflight-artifact-manifest.txt" \
            "docs/generated/medicaid-application-quick-guide/medicaid-application-quick-guide-preflight.html" \
            "docs/generated/medicaid-application-quick-guide/medicaid-application-quick-guide-preflight.pdf"

      - name: Upload full guide draft PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: medicare-medicaid-guide-preflight-draft
          path: |
            docs/generated/medicare-medicaid-guide/hospital-family-guide-medicare-medicaid-preflight.html
            docs/generated/medicare-medicaid-guide/hospital-family-guide-medicare-medicaid-preflight.pdf
            docs/generated/medicare-medicaid-guide/guide-preflight-artifact-manifest.txt
          if-no-files-found: error
          retention-days: 14

      - name: Upload quick guide draft PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: medicare-medicaid-quick-guide-preflight-draft
          path: |
            docs/generated/medicare-medicaid-quick-guide/hospital-discharge-medicare-quick-guide-preflight.html
            docs/generated/medicare-medicaid-quick-guide/hospital-discharge-medicare-quick-guide-preflight.pdf
            docs/generated/medicare-medicaid-quick-guide/quick-guide-preflight-artifact-manifest.txt
          if-no-files-found: error
          retention-days: 14

      - name: Upload Medicare sign-up quick guide draft PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: medicare-sign-up-quick-guide-preflight-draft
          path: |
            docs/generated/medicare-sign-up-quick-guide/medicare-sign-up-quick-guide-preflight.html
            docs/generated/medicare-sign-up-quick-guide/medicare-sign-up-quick-guide-preflight.pdf
            docs/generated/medicare-sign-up-quick-guide/quick-guide-preflight-artifact-manifest.txt
          if-no-files-found: error
          retention-days: 14

      - name: Upload Medicaid application quick guide draft PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: medicaid-application-quick-guide-preflight-draft
          path: |
            docs/generated/medicaid-application-quick-guide/medicaid-application-quick-guide-preflight.html
            docs/generated/medicaid-application-quick-guide/medicaid-application-quick-guide-preflight.pdf
            docs/generated/medicaid-application-quick-guide/quick-guide-preflight-artifact-manifest.txt
          if-no-files-found: error
          retention-days: 14

      - name: Publish quick guide PDF to public path for launch review
        if: github.event_name == 'pull_request' && (github.head_ref == 'guide-final-pdf-candidate' || github.head_ref == 'quick-guide-print-dense-v2' || github.head_ref == 'clear-care-path-visual')
        run: |
          set -euo pipefail
          mkdir -p public/guides
          cp docs/generated/medicare-medicaid-quick-guide/hospital-discharge-medicare-quick-guide-preflight.pdf public/guides/hospital-discharge-medicare-quick-guide.pdf

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/guides/hospital-discharge-medicare-quick-guide.pdf

          if git diff --cached --quiet; then
            echo "Public quick guide PDF already matches generated artifact."
          else
            git commit -m "Publish quick guide PDF for launch review"
            git push origin "HEAD:${GITHUB_HEAD_REF}"
          fi

      - name: Unlock quick guide download CTA for launch review
        if: github.event_name == 'pull_request' && (github.head_ref == 'guide-final-pdf-candidate' || github.head_ref == 'quick-guide-print-dense-v2' || github.head_ref == 'clear-care-path-visual')
        run: |
          set -euo pipefail
          node <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';

          const path = 'src/pages/MedicareMedicaidGuideLandingPage.tsx';
          let source = readFileSync(path, 'utf8');

          const lockedButton = `<Button size="lg" disabled title="The final downloadable PDF is not public yet.">
          <FileText className="h-4 w-4" />
          Download guide — source review in progress
        </Button>`;

          const liveButton = `<Button asChild size="lg">
          <a href="/guides/hospital-discharge-medicare-quick-guide.pdf" download>
            <FileText className="h-4 w-4" />
            Download the Quick Guide
          </a>
        </Button>`;

          source = source.replaceAll(lockedButton, liveButton);
          source = source.replace(
            'description="The final PDF will point back to these tools so families can move from explanation to a practical next question."',
            'description="The downloadable Quick Guide points back to these tools so families can move from explanation to a practical next question."',
          );
          source = source.replace('Why the download is not live yet', 'Download the Quick Guide');
          source = source.replace(
            'The manuscript, source review, print workflow, and artifact workflow are built, but the final public PDF is intentionally held until the generated artifact passes manual visual, mobile, print, and QR review.',
            'The public Quick Guide PDF is now available for launch review. Use it as a fast, printable starting point before discharge, rehab, long-term care, Medicaid, or medical-bill conversations.',
          );
          source = source.replace('What must happen before release', 'What still gets reviewed');
          source = source.replace('<li>Run the GitHub Actions PDF artifact workflow</li>', '<li>Review the PDF on desktop and phone</li>');
          source = source.replace('<li>Inspect the PDF on desktop and mobile</li>', '<li>Print sample pages in black and white</li>');
          source = source.replace('<li>Print sample pages in black and white</li>', '<li>Confirm the direct PDF URL after production deployment</li>');
          source = source.replace('<li>Generate and test final QR codes later</li>', '<li>Add sitemap and destination markers only after URL testing</li>');

          writeFileSync(path, source);
          NODE

          git add src/pages/MedicareMedicaidGuideLandingPage.tsx

          if git diff --cached --quiet; then
            echo "Quick guide CTA already unlocked."
          else
            git commit -m "Unlock quick guide download CTA for launch review"
            git push origin "HEAD:${GITHUB_HEAD_REF}"
          fi
