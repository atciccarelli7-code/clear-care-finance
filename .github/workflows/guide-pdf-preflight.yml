name: Guide PDF Preflight Artifact

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/guide-pdf-preflight.yml
      - docs/medicare-medicaid-guide-final-pre-pdf-manuscript.md
      - docs/medicare-medicaid-quick-guide-pre-pdf-manuscript.md
      - scripts/build-medicare-medicaid-guide-pdf.mjs
      - scripts/build-medicare-medicaid-quick-guide-pdf.mjs
      - scripts/check-medicare-medicaid-guide-content.mjs
      - scripts/check-medicare-medicaid-quick-guide-content.mjs
      - package.json
      - package-lock.json

permissions:
  contents: write

jobs:
  build-guide-pdf-artifacts:
    name: Build draft guide PDF artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run guide content checks
        run: |
          set -euo pipefail
          npm run guide:content-check
          npm run guide:quick-content-check

      - name: Build draft PDFs locally in docs/generated
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          set -euo pipefail
          npm run guide:pdf:draft
          npm run guide:quick-pdf:draft

      - name: Confirm generated full guide files exist and are non-empty
        run: |
          set -euo pipefail
          html="docs/generated/medicare-medicaid-guide/hospital-family-guide-medicare-medicaid-preflight.html"
          pdf="docs/generated/medicare-medicaid-guide/hospital-family-guide-medicare-medicaid-preflight.pdf"

          test -s "$html"
          test -s "$pdf"

          html_bytes=$(stat -c%s "$html")
          pdf_bytes=$(stat -c%s "$pdf")

          echo "Generated full guide HTML bytes: $html_bytes"
          echo "Generated full guide PDF bytes: $pdf_bytes"

          if [ "$pdf_bytes" -lt 50000 ]; then
            echo "Generated full guide PDF is unexpectedly small. Treating this as a failed preflight artifact."
            exit 1
          fi

      - name: Confirm generated quick guide files exist and are non-empty
        run: |
          set -euo pipefail
          html="docs/generated/medicare-medicaid-quick-guide/hospital-discharge-medicare-quick-guide-preflight.html"
          pdf="docs/generated/medicare-medicaid-quick-guide/hospital-discharge-medicare-quick-guide-preflight.pdf"

          test -s "$html"
          test -s "$pdf"

          html_bytes=$(stat -c%s "$html")
          pdf_bytes=$(stat -c%s "$pdf")

          echo "Generated quick guide HTML bytes: $html_bytes"
          echo "Generated quick guide PDF bytes: $pdf_bytes"

          if [ "$pdf_bytes" -lt 20000 ]; then
            echo "Generated quick guide PDF is unexpectedly small. Treating this as a failed preflight artifact."
            exit 1
          fi

      - name: Fail if any PDF was placed under public draft or guide paths before publish step
        run: |
          set -euo pipefail
          for dir in public/drafts public/guides; do
            if [ -d "$dir" ] && find "$dir" -type f -iname "*.pdf" | grep -q .; then
              echo "PDF found under $dir before the controlled publish step."
              find "$dir" -type f -iname "*.pdf"
              exit 1
            fi
          done

      - name: Create full guide artifact manifest
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          set -euo pipefail
          out="docs/generated/medicare-medicaid-guide/guide-preflight-artifact-manifest.txt"
          html="docs/generated/medicare-medicaid-guide/hospital-family-guide-medicare-medicaid-preflight.html"
          pdf="docs/generated/medicare-medicaid-guide/hospital-family-guide-medicare-medicaid-preflight.pdf"

          {
            echo "Guide PDF Preflight Artifact Manifest"
            echo "Generated at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Commit: ${GITHUB_SHA}"
            echo "Run ID: ${GITHUB_RUN_ID}"
            echo "Run number: ${GITHUB_RUN_NUMBER}"
            echo "Chrome path: ${CHROME_PATH:-not set}"
            echo
            echo "Generated files:"
            ls -lh "$html" "$pdf"
            echo
            echo "SHA-256 checksums:"
            sha256sum "$html" "$pdf"
          } > "$out"

          cat "$out"

      - name: Create quick guide artifact manifest
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          set -euo pipefail
          out="docs/generated/medicare-medicaid-quick-guide/quick-guide-preflight-artifact-manifest.txt"
          html="docs/generated/medicare-medicaid-quick-guide/hospital-discharge-medicare-quick-guide-preflight.html"
          pdf="docs/generated/medicare-medicaid-quick-guide/hospital-discharge-medicare-quick-guide-preflight.pdf"

          {
            echo "Quick Guide PDF Preflight Artifact Manifest"
            echo "Generated at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Commit: ${GITHUB_SHA}"
            echo "Run ID: ${GITHUB_RUN_ID}"
            echo "Run number: ${GITHUB_RUN_NUMBER}"
            echo "Chrome path: ${CHROME_PATH:-not set}"
            echo
            echo "Generated files:"
            ls -lh "$html" "$pdf"
            echo
            echo "SHA-256 checksums:"
            sha256sum "$html" "$pdf"
          } > "$out"

          cat "$out"

      - name: Upload full guide draft PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: medicare-medicaid-guide-preflight-draft
          path: |
            docs/generated/medicare-medicaid-guide/hospital-family-guide-medicare-medicaid-preflight.html
            docs/generated/medicare-medicaid-guide/hospital-family-guide-medicare-medicaid-preflight.pdf
            docs/generated/medicare-medicaid-guide/guide-preflight-artifact-manifest.txt
          if-no-files-found: error
          retention-days: 14

      - name: Upload quick guide draft PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: medicare-medicaid-quick-guide-preflight-draft
          path: |
            docs/generated/medicare-medicaid-quick-guide/hospital-discharge-medicare-quick-guide-preflight.html
            docs/generated/medicare-medicaid-quick-guide/hospital-discharge-medicare-quick-guide-preflight.pdf
            docs/generated/medicare-medicaid-quick-guide/quick-guide-preflight-artifact-manifest.txt
          if-no-files-found: error
          retention-days: 14

      - name: Publish quick guide PDF to public path for launch review
        if: github.event_name == 'pull_request' && github.head_ref == 'guide-final-pdf-candidate'
        run: |
          set -euo pipefail
          mkdir -p public/guides
          cp docs/generated/medicare-medicaid-quick-guide/hospital-discharge-medicare-quick-guide-preflight.pdf public/guides/hospital-discharge-medicare-quick-guide.pdf

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/guides/hospital-discharge-medicare-quick-guide.pdf

          if git diff --cached --quiet; then
            echo "Public quick guide PDF already matches generated artifact."
          else
            git commit -m "Publish quick guide PDF for launch review"
            git push origin "HEAD:${GITHUB_HEAD_REF}"
          fi
