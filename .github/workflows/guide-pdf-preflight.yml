name: Guide PDF Preflight Artifact

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-guide-pdf-artifact:
    name: Build draft guide PDF artifact
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Build draft PDF locally in docs/generated
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run guide:pdf:draft

      - name: Confirm generated draft files exist and are non-empty
        run: |
          set -euo pipefail
          html="docs/generated/medicare-medicaid-guide/hospital-family-guide-medicare-medicaid-preflight.html"
          pdf="docs/generated/medicare-medicaid-guide/hospital-family-guide-medicare-medicaid-preflight.pdf"

          test -s "$html"
          test -s "$pdf"

          html_bytes=$(stat -c%s "$html")
          pdf_bytes=$(stat -c%s "$pdf")

          echo "Generated HTML bytes: $html_bytes"
          echo "Generated PDF bytes: $pdf_bytes"

          if [ "$pdf_bytes" -lt 50000 ]; then
            echo "Generated PDF is unexpectedly small. Treating this as a failed preflight artifact."
            exit 1
          fi

      - name: Fail if any PDF was placed under public draft or guide paths
        run: |
          set -euo pipefail
          for dir in public/drafts public/guides; do
            if [ -d "$dir" ] && find "$dir" -type f -iname "*.pdf" | grep -q .; then
              echo "Generated or committed PDF found under $dir. Draft PDFs must not be placed in public paths."
              find "$dir" -type f -iname "*.pdf"
              exit 1
            fi
          done

      - name: Create artifact manifest
        run: |
          set -euo pipefail
          out="docs/generated/medicare-medicaid-guide/guide-preflight-artifact-manifest.txt"
          html="docs/generated/medicare-medicaid-guide/hospital-family-guide-medicare-medicaid-preflight.html"
          pdf="docs/generated/medicare-medicaid-guide/hospital-family-guide-medicare-medicaid-preflight.pdf"

          {
            echo "Guide PDF Preflight Artifact Manifest"
            echo "Generated at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Commit: ${GITHUB_SHA}"
            echo "Run ID: ${GITHUB_RUN_ID}"
            echo "Run number: ${GITHUB_RUN_NUMBER}"
            echo "Chrome path: ${CHROME_PATH:-not set}"
            echo
            echo "Generated files:"
            ls -lh "$html" "$pdf"
            echo
            echo "SHA-256 checksums:"
            sha256sum "$html" "$pdf"
            echo
            echo "Public PDF guardrail check: no PDF files are allowed under public/drafts or public/guides during artifact review."
            for dir in public/drafts public/guides; do
              if [ -d "$dir" ]; then
                echo "$dir:"
                find "$dir" -type f -iname "*.pdf" -print || true
              else
                echo "$dir: directory does not exist"
              fi
            done
          } > "$out"

          cat "$out"

      - name: Upload draft guide PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: medicare-medicaid-guide-preflight-draft
          path: |
            docs/generated/medicare-medicaid-guide/hospital-family-guide-medicare-medicaid-preflight.html
            docs/generated/medicare-medicaid-guide/hospital-family-guide-medicare-medicaid-preflight.pdf
            docs/generated/medicare-medicaid-guide/guide-preflight-artifact-manifest.txt
          if-no-files-found: error
          retention-days: 14
