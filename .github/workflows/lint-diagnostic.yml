name: Lint Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  capture-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --silent
      - name: Capture lint output
        run: npm run lint > lint-output.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: lint-diagnostic
          path: lint-output.txt
          retention-days: 1
