name: Patient Education Authority Type Certification

on:
  pull_request:
    paths:
      - "src/lib/patientEducation*.ts"
      - "src/test/patientEducation*.test.ts"
      - "src/test/fixtures/patientEducationEngineFixture.ts"
      - "config/patient-education-*.json"
      - "scripts/check-patient-education-capability-registry.mjs"
      - "scripts/check-patient-education-authority-foundation.mjs"
      - "tsconfig.patient-education-authority.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/patient-education-authority-typecheck.yml"
  push:
    branches:
      - agent/caf-patient-education-product
    paths:
      - "src/lib/patientEducation*.ts"
      - "src/test/patientEducation*.test.ts"
      - "src/test/fixtures/patientEducationEngineFixture.ts"
      - "config/patient-education-*.json"
      - "scripts/check-patient-education-capability-registry.mjs"
      - "scripts/check-patient-education-authority-foundation.mjs"
      - "tsconfig.patient-education-authority.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/patient-education-authority-typecheck.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: patient-education-authority-typecheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-certification:
    name: Type-check governed authority contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Check out exact revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Validate canonical capability registry
        run: npm run patient-education:registry-check

      - name: Validate authority foundation
        run: npm run patient-education:authority-check

      - name: Type-check authority contracts and tests
        run: npm run patient-education:authority-typecheck
