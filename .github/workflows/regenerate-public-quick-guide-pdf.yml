name: Regenerate Public Quick Guide PDF

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/regenerate-public-quick-guide-pdf.yml

permissions:
  contents: write

jobs:
  regenerate-public-pdf:
    name: Regenerate public hospital discharge Quick Guide PDF
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run requested checks and draft PDF build
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          set -euo pipefail
          npm run guide:quick-content-check
          npm run guide:quick-content-check:all
          npm run guide:quick-pdf:draft

      - name: Copy generated PDF to public path
        run: |
          set -euo pipefail
          generated="docs/generated/medicare-medicaid-quick-guide/hospital-discharge-medicare-quick-guide-preflight.pdf"
          public="public/guides/hospital-discharge-medicare-quick-guide.pdf"
          test -s "$generated"
          mkdir -p "$(dirname "$public")"
          cp "$generated" "$public"
          test -s "$public"
          echo "PDF file size: $(stat -c%s "$public") bytes"
          echo "PDF SHA-256: $(sha256sum "$public" | awk '{print $1}')"

      - name: Confirm only allowed public guide PDF exists
        run: |
          set -euo pipefail
          allowed="public/guides/hospital-discharge-medicare-quick-guide.pdf"
          unexpected=$(find public/guides -type f -iname "*.pdf" ! -path "$allowed" -print || true)
          if [ -n "$unexpected" ]; then
            echo "Unexpected public guide PDF found:"
            echo "$unexpected"
            exit 1
          fi

      - name: Commit regenerated PDF only
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/guides/hospital-discharge-medicare-quick-guide.pdf
          if git diff --cached --quiet; then
            echo "Public PDF already matches generated print-dense draft."
          else
            git commit -m "Regenerate print-dense hospital discharge quick guide PDF"
            git push origin HEAD:main
          fi

# Triggered intentionally after workflow was present on main.
