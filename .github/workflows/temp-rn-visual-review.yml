name: Temporary RN visual review

on:
  push:
    branches:
      - agent/discharge-readiness-system
    paths:
      - "src/**"
      - "scripts/temp-capture-rn-visual-review.mjs"
      - ".github/workflows/temp-rn-visual-review.yml"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.ts"

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Start preview server
        run: |
          npm run preview:test > /tmp/caf-preview.log 2>&1 &
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:4173/patients-families/hospital-guide > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/caf-preview.log
          exit 1
      - run: node scripts/temp-capture-rn-visual-review.mjs
      - name: Upload visual review evidence
        uses: actions/upload-artifact@v4
        with:
          name: rn-visual-review-${{ github.run_id }}
          path: visual-review-artifacts/
          retention-days: 3
          if-no-files-found: error
